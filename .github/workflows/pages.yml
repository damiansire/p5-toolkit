name: Deploy showcase to Pages

on:
    push:
        branches: [main]
        paths:
            - 'showcase/**'
            - 'packages/**'
            - '.github/workflows/pages.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            # The showcase is self-contained: it bundles the packages from source
            # (Vite aliases) and only needs its own deps (Vite + p5).
            # This repo does not commit lockfiles (see .git/info/exclude), so install
            # rather than ci.
            - name: Build the showcase
              working-directory: showcase
              run: |
                  npm install
                  npm run build
            - uses: actions/configure-pages@v5
            - uses: actions/upload-pages-artifact@v3
              with:
                  path: showcase/dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4
