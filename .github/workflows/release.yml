name: Release

# Opens a "Version Packages" PR when changesets are present, and publishes the
# changed packages to npm once that PR is merged.
#
# Requires a repo secret `NPM_TOKEN` — a classic npm Automation token (bypasses
# 2FA in CI; granular tokens tend to bounce with E403).

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: write
    # npm provenance (publishConfig.provenance en los 7 paquetes) exige OIDC
    id-token: write

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5

            - uses: actions/setup-node@v5
              with:
                  node-version: 20
                  cache: npm
                  registry-url: https://registry.npmjs.org

            - run: npm ci

            # Never publish an artifact this pipeline did not verify. Gate the
            # publish on the same checks ci.yml runs.
            - name: Lint
              run: npm run lint

            - name: Format check
              run: npm run format:check

            - name: Build
              run: npm run build

            - name: Test
              run: npm test

            - name: Create Release PR or publish
              uses: changesets/action@v1
              with:
                  version: npm run version-packages
                  publish: npm run release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # changesets/action busca NPM_TOKEN (no NODE_AUTH_TOKEN) para
                  # escribir su .npmrc; sin esto cae a trusted publishing OIDC,
                  # que no funciona para paquetes nunca publicados
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
