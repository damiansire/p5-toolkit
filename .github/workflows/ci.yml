name: CI

on:
    push:
        branches: [main]
    pull_request:

# Cancel superseded runs on the same ref so stale jobs don't pile up.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: lint (eslint)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            # Reproducible install from the committed lockfile.
            - run: npm ci
            - run: npm run lint

    format:
        name: format (prettier --check)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            - run: npm run format:check

    test:
        name: test + build (Node ${{ matrix.node }})
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                node: [18, 20, 22]
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm
            - run: npm ci
            - run: npm test --workspaces --if-present
            - run: npm run build --workspaces --if-present

    pack:
        name: publish-prep (npm pack dry-run)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm
            - run: npm ci
            # Validate every workspace produces a clean tarball (exports/files map)
            # without publishing. Catches a broken `files` allowlist or exports map
            # before it reaches the registry.
            - run: npm pack --workspaces --dry-run
