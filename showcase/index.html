<!doctype html>
<html lang="en" data-theme="dark">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Live gallery for the p5-toolkit packages: boids, flow fields, mandalas, Game of Life, L-systems, colour palettes and plotting axes, each as an interactive p5.js sketch."
        />
        <link
            rel="icon"
            href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230b1020'/%3E%3Ccircle cx='11' cy='13' r='4' fill='%23ffd84d'/%3E%3Ccircle cx='21' cy='19' r='5' fill='%2300ff8c'/%3E%3C/svg%3E"
        />
        <title>p5-toolkit / showcase</title>
    </head>
    <body>
        <header class="hero">
            <div class="hero__inner">
                <h1 class="hero__title">p5-toolkit</h1>
                <p class="hero__tagline">
                    Creative-coding utilities for p5.js. Every package below is live &mdash; scroll
                    to run each sketch, click a name to open it on npm.
                </p>
                <a
                    class="hero__repo"
                    href="https://github.com/damiansire/p5-toolkit"
                    target="_blank"
                    rel="noreferrer noopener"
                >
                    github.com/damiansire/p5-toolkit
                </a>
            </div>
        </header>
        <main id="gallery" class="gallery"></main>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
